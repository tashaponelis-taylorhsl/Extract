<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thai Ledger — AI Accounting Extractor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #070d1a; color: #e2e8f0; font-family: 'Courier New', monospace; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .rh:hover { background: rgba(59,130,246,0.06) !important; }
    .fh:hover { background: rgba(30,58,95,0.5) !important; cursor: pointer; }
    .tab:hover { border-color: #3b82f6 !important; color: #94a3b8 !important; }
    input:focus { outline: 1px solid #3b82f6 !important; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0d1b35; } ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const STAGES = { IDLE:"idle", CONNECTING:"connecting", BROWSING:"browsing", EXTRACTING:"extracting", ANALYZING:"analyzing", DONE:"done" };
const VIEWS = { UPLOAD:"upload", TEAMS:"teams" };

const SYSTEM_PROMPT = `You are an expert accounting data extractor for Thai and English documents.
Extract ALL financial transactions from the document. May be Thai, English, or mixed.
Return ONLY a JSON object (no markdown, no explanation):
{
  "documentType": "invoice|receipt|bank_statement|expense_report|other",
  "vendor": "vendor/company name in English",
  "documentDate": "MM/DD/YYYY",
  "documentNumber": "invoice or document number",
  "currency": "THB|USD|EUR|etc",
  "transactions": [{"date":"MM/DD/YYYY","description":"English description","amount":-123.45,"category":"QBO category"}],
  "subtotal":0,"discount":0,"afterDiscount":0,"vatRate":7,"vatAmount":0,"totalAmount":0,"whtRate":0,"whtAmount":0,"netPayable":0,"notes":""
}
Rules: Translate ALL Thai to English. Expenses=NEGATIVE. Income=POSITIVE. Dates MM/DD/YYYY. Numbers only.
Thai VAT (ภาษีมูลค่าเพิ่ม) typically 7%. WHT (ภาษีหัก ณ ที่จ่าย) — extract rate+amount separately, do NOT add to transactions array.
totalAmount=gross incl VAT. netPayable=totalAmount-whtAmount.`;

const GRAPH_SCOPES = ["Files.Read.All","Sites.Read.All","offline_access","openid","profile"];

function b64url(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,""); }
async function genPKCE() {
  const v = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const c = b64url(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v)));
  return { verifier:v, challenge:c };
}

function App() {
  const [stage, setStage] = useState(STAGES.IDLE);
  const [view, setView] = useState(VIEWS.UPLOAD);
  const [results, setResults] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [progress, setProgress] = useState({ current:0, total:0, message:"" });
  const [selectedRows, setSelectedRows] = useState({});
  const fileInputRef = useRef();
  const [msConfig, setMsConfig] = useState({ clientId:"", tenantId:"", folderUrl:"" });
  const [graphToken, setGraphToken] = useState(null);
  const [graphFiles, setGraphFiles] = useState([]);
  const [selectedFiles, setSelectedFiles] = useState({});
  const [folderPath, setFolderPath] = useState([]);
  const [authError, setAuthError] = useState("");
  const [showSetup, setShowSetup] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [showApiKey, setShowApiKey] = useState(false);

  useEffect(() => {
    const saved = localStorage.getItem("tl_config");
    if (saved) { try { const c = JSON.parse(saved); setMsConfig(c.ms||{}); setApiKey(c.apiKey||""); } catch{} }
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code"), state = params.get("state");
    if (code && state) {
      const saved = JSON.parse(sessionStorage.getItem("pkce_state")||"{}");
      if (saved.state === state) {
        exchangeCode(code, saved.verifier, saved.config).then(token => {
          setGraphToken(token); setMsConfig(saved.config);
          setView(VIEWS.TEAMS); setStage(STAGES.BROWSING);
          window.history.replaceState({}, "", window.location.pathname);
          fetchFolder(token, "root", [{ name:"My Drive", id:"root" }]);
        }).catch(e => setAuthError(e.message));
      }
    }
  }, []);

  const saveConfig = () => {
    localStorage.setItem("tl_config", JSON.stringify({ ms: msConfig, apiKey }));
    alert("Configuration saved!");
  };

  async function exchangeCode(code, verifier, config) {
    const body = new URLSearchParams({ client_id:config.clientId, grant_type:"authorization_code", code, redirect_uri:window.location.origin+window.location.pathname, code_verifier:verifier, scope:GRAPH_SCOPES.join(" ") });
    const res = await fetch(`https://login.microsoftonline.com/${config.tenantId}/oauth2/v2.0/token`, { method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body });
    const d = await res.json();
    if (d.error) throw new Error(d.error_description||d.error);
    return d.access_token;
  }

  async function connectMs() {
    if (!msConfig.clientId||!msConfig.tenantId) { setAuthError("Please enter Client ID and Tenant ID."); return; }
    setAuthError(""); setStage(STAGES.CONNECTING);
    const { verifier, challenge } = await genPKCE();
    const state = b64url(crypto.getRandomValues(new Uint8Array(16)));
    sessionStorage.setItem("pkce_state", JSON.stringify({ state, verifier, config:msConfig }));
    const authUrl = `https://login.microsoftonline.com/${msConfig.tenantId}/oauth2/v2.0/authorize?`+new URLSearchParams({ client_id:msConfig.clientId, response_type:"code", redirect_uri:window.location.origin+window.location.pathname, scope:GRAPH_SCOPES.join(" "), state, code_challenge:challenge, code_challenge_method:"S256", prompt:"select_account" });
    window.location.href = authUrl;
  }

  async function gFetch(url, token) {
    const r = await fetch(url, { headers:{ Authorization:`Bearer ${token}` } });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message||"Graph error"); }
    return r.json();
  }

  async function fetchFolder(token, folderId, path) {
    try {
      setStage(STAGES.BROWSING);
      const url = folderId === "root" ? "https://graph.microsoft.com/v1.0/me/drive/root/children" : `https://graph.microsoft.com/v1.0/me/drive/items/${folderId}/children`;
      const data = await gFetch(url, token);
      const items = data.value.filter(i => i.folder || i.name?.toLowerCase().endsWith(".pdf"));
      setGraphFiles(items); setFolderPath(path); 
    } catch(e) { setAuthError(e.message); }
  }

  async function browseFolder(item) {
    await fetchFolder(graphToken, item.id, [...folderPath, { name:item.name, id:item.id }]);
  }

  async function navBack(idx) {
    await fetchFolder(graphToken, folderPath[idx].id, folderPath.slice(0, idx+1));
  }

  async function downloadAndProcess() {
    const toProcess = graphFiles.filter(f => selectedFiles[f.id] && !f.folder);
    if (!toProcess.length) return;
    setResults([]); setStage(STAGES.EXTRACTING);
    const newResults = [];
    for (let i = 0; i < toProcess.length; i++) {
      const file = toProcess[i];
      setProgress({ current:i+1, total:toProcess.length, message:`Downloading: ${file.name}` });
      try {
        const dlRes = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${file.id}/content`, { headers:{ Authorization:`Bearer ${graphToken}` } });
        const ab = await dlRes.arrayBuffer();
        setProgress({ current:i+1, total:toProcess.length, message:`Extracting: ${file.name}` });
        const text = await pdfToText(ab);
        setProgress({ current:i+1, total:toProcess.length, message:`AI analyzing: ${file.name}` });
        setStage(STAGES.ANALYZING);
        const extracted = await analyze(text, file.name);
        newResults.push({ file:file.name, extracted, source:"teams" });
      } catch(err) { newResults.push({ file:file.name, extracted:null, error:err.message }); }
    }
    finalize(newResults);
  }

  async function pdfToText(arrayBuffer) {
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(it => it.str).join(" ") + "\n";
    }
    return text;
  }

  async function analyze(text, fileName) {
    const key = apiKey || "";
    const headers = { "Content-Type":"application/json" };
    if (key) headers["x-api-key"] = key;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers,
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:SYSTEM_PROMPT, messages:[{ role:"user", content:`Extract accounting data (file: ${fileName}):\n\n${text.slice(0,12000)}` }] })
    });
    const d = await res.json();
    try { return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim()); } catch { return null; }
  }

  function finalize(newResults) {
    setResults(newResults);
    const sel = {};
    newResults.forEach((r,ri) => {
      r.extracted?.transactions?.forEach((_,ti) => { sel[`${ri}-${ti}`]=true; });
      if (r.extracted?.whtAmount>0) sel[`${ri}-wht`]=true;
    });
    setSelectedRows(sel); setStage(STAGES.DONE);
  }

  const processFiles = async (fileList) => {
    setStage(STAGES.EXTRACTING);
    const newResults = [];
    for (let i = 0; i < fileList.length; i++) {
      const file = fileList[i];
      setProgress({ current:i+1, total:fileList.length, message:`Extracting: ${file.name}` });
      try {
        const ab = await file.arrayBuffer();
        const text = file.type==="application/pdf" ? await pdfToText(ab) : await file.text();
        setProgress({ current:i+1, total:fileList.length, message:`AI analyzing: ${file.name}` });
        setStage(STAGES.ANALYZING);
        const extracted = await analyze(text, file.name);
        newResults.push({ file:file.name, extracted });
      } catch(err) { newResults.push({ file:file.name, extracted:null, error:err.message }); }
    }
    finalize(newResults);
  };

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    const f = Array.from(e.dataTransfer.files).filter(f=>f.type==="application/pdf"||f.name.endsWith(".txt"));
    if (f.length) processFiles(f);
  }, [apiKey]);

  const exportCSV = () => {
    const rows = [["Date","Description","Amount","Vendor","Document Number","Category","Currency","Notes"]];
    results.forEach((r,ri) => {
      if (!r.extracted?.transactions) return;
      const ex = r.extracted;
      ex.transactions.forEach((t,ti) => {
        if (!selectedRows[`${ri}-${ti}`]) return;
        const notes = [ex.discount?`Discount:${ex.discount}`:"", ex.vatAmount?`VAT ${ex.vatRate||7}%:${ex.vatAmount}`:"", ex.whtAmount?`WHT ${ex.whtRate||3}%:${ex.whtAmount}(separate)`:""].filter(Boolean).join(" | ");
        rows.push([t.date||ex.documentDate||"", `"${(t.description||"").replace(/"/g,'""')}"`, t.amount??"", `"${(ex.vendor||"").replace(/"/g,'""')}"`, ex.documentNumber||"", `"${(t.category||"").replace(/"/g,'""')}"`, ex.currency||"THB", `"${notes}"`]);
      });
      if (ex.whtAmount>0 && selectedRows[`${ri}-wht`]) {
        rows.push([ex.documentDate||"", `"Withholding Tax ${ex.whtRate||3}% credit - ${ex.documentNumber} (ภาษีหัก ณ ที่จ่าย)"`, ex.whtAmount, `"${(ex.vendor||"").replace(/"/g,'""')}"`, `"${ex.documentNumber}-WHT"`, "Withholding Tax Payable", ex.currency||"THB", `"WHT on taxable base. Net payable: ${ex.netPayable}"`]);
      }
    });
    const csv = rows.map(r=>r.join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv"});
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="quickbooks_import.csv"; a.click();
  };

  const reset = () => { setStage(STAGES.IDLE); setResults([]); setSelectedRows({}); setGraphFiles([]); setSelectedFiles({}); };
  const toggleRow = (key) => setSelectedRows(s=>({...s,[key]:!s[key]}));
  const totalExpense = results.reduce((sum,r,ri)=>sum+(r.extracted?.transactions||[]).reduce((s,t,ti)=>selectedRows[`${ri}-${ti}`]?s+(parseFloat(t.amount)||0):s,0),0);
  const totalWHT = results.reduce((sum,r,ri)=>selectedRows[`${ri}-wht`]?sum+(r.extracted?.whtAmount||0):sum,0);
  const isProcessing = stage===STAGES.EXTRACTING||stage===STAGES.ANALYZING;
  const fmt = (n) => (n||0).toLocaleString("en-US",{minimumFractionDigits:2});

  return (
    <div style={{minHeight:"100vh",background:"#070d1a",fontFamily:"'Courier New',monospace",color:"#e2e8f0"}}>
      {/* Header */}
      <div style={{borderBottom:"1px solid #162032",padding:"16px 32px",display:"flex",alignItems:"center",gap:14,background:"linear-gradient(90deg,#070d1a,#0d1b35)"}}>
        <div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",color:"#fff",fontSize:14}}>TH</div>
        <div>
          <div style={{fontSize:16,fontWeight:"bold",letterSpacing:"0.06em"}}>THAI·LEDGER</div>
          <div style={{fontSize:10,color:"#475569",letterSpacing:"0.12em"}}>AI ACCOUNTING EXTRACTOR · EN/TH → QUICKBOOKS CSV</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <button onClick={()=>setShowApiKey(!showApiKey)} style={{padding:"6px 12px",background:"transparent",border:"1px solid #1e3a5f",borderRadius:6,color:"#64748b",cursor:"pointer",fontSize:10}}>⚙ Settings</button>
          {stage===STAGES.DONE && <button onClick={reset} style={{padding:"6px 14px",background:"transparent",border:"1px solid #1e3a5f",borderRadius:6,color:"#64748b",cursor:"pointer",fontSize:11}}>← New Batch</button>}
        </div>
      </div>

      {/* Settings Panel */}
      {showApiKey && (
        <div style={{background:"rgba(13,20,35,0.98)",borderBottom:"1px solid #162032",padding:"16px 32px",display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:240}}>
            <div style={{fontSize:10,color:"#475569",marginBottom:5,letterSpacing:"0.08em"}}>ANTHROPIC API KEY (optional — uses shared key if blank)</div>
            <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",padding:"8px 12px",background:"rgba(22,32,50,0.6)",border:"1px solid #1e3a5f",borderRadius:6,color:"#e2e8f0",fontSize:12,fontFamily:"monospace"}} />
          </div>
          <button onClick={saveConfig} style={{padding:"8px 16px",background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.3)",borderRadius:6,color:"#3b82f6",cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>💾 Save Settings</button>
        </div>
      )}

      <div style={{maxWidth:1060,margin:"0 auto",padding:"32px 20px"}}>

        {/* TABS */}
        {!isProcessing && stage!==STAGES.DONE && (
          <div style={{display:"flex",gap:10,marginBottom:28}}>
            {[{id:VIEWS.UPLOAD,label:"📁 Upload Files"},{id:VIEWS.TEAMS,label:"🔷 Microsoft Teams / SharePoint"}].map(t=>(
              <button key={t.id} className="tab" onClick={()=>setView(t.id)} style={{padding:"9px 20px",borderRadius:8,border:`1px solid ${view===t.id?"#3b82f6":"#162032"}`,background:view===t.id?"rgba(59,130,246,0.1)":"transparent",color:view===t.id?"#3b82f6":"#475569",cursor:"pointer",fontSize:12,fontFamily:"'Courier New',monospace",letterSpacing:"0.04em",transition:"all 0.15s"}}>{t.label}</button>
            ))}
          </div>
        )}

        {/* UPLOAD VIEW */}
        {!isProcessing && stage!==STAGES.DONE && view===VIEWS.UPLOAD && (
          <div style={{animation:"fadeUp 0.3s ease"}}>
            <div onDrop={handleDrop} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onClick={()=>fileInputRef.current.click()}
              style={{border:`2px dashed ${dragOver?"#3b82f6":"#162032"}`,borderRadius:14,padding:"64px 40px",textAlign:"center",cursor:"pointer",transition:"all 0.2s",background:"rgba(13,23,42,0.5)"}}>
              <div style={{fontSize:44,marginBottom:14}}>📄</div>
              <div style={{fontSize:15,color:"#e2e8f0",marginBottom:6,fontWeight:"bold"}}>Drop PDF files here</div>
              <div style={{fontSize:12,color:"#334155"}}>Invoices · Receipts · Bank Statements · Thai or English</div>
              <div style={{marginTop:20,display:"inline-block",padding:"8px 20px",background:"linear-gradient(135deg,#3b82f6,#06b6d4)",borderRadius:7,fontSize:11,color:"#fff",letterSpacing:"0.07em"}}>SELECT FILES</div>
              <input ref={fileInputRef} type="file" multiple accept=".pdf,.txt" onChange={e=>{const f=Array.from(e.target.files);if(f.length)processFiles(f);}} style={{display:"none"}} />
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:24,flexWrap:"wrap"}}>
              {["🇹🇭 Thai Language","🔤 Auto-Translate","🧾 VAT Detection","📋 WHT Credit Lines","📥 QBO CSV Export"].map(f=>(
                <div key={f} style={{padding:"5px 13px",background:"rgba(22,32,50,0.6)",borderRadius:20,fontSize:11,color:"#64748b",border:"1px solid #162032"}}>{f}</div>
              ))}
            </div>
          </div>
        )}

        {/* TEAMS VIEW */}
        {!isProcessing && stage!==STAGES.DONE && view===VIEWS.TEAMS && (
          <div style={{animation:"fadeUp 0.3s ease"}}>
            {!graphToken ? (
              <div>
                <div style={{background:"rgba(13,20,35,0.9)",border:"1px solid #162032",borderRadius:12,marginBottom:20,overflow:"hidden"}}>
                  <button onClick={()=>setShowSetup(!showSetup)} style={{width:"100%",padding:"14px 18px",background:"transparent",border:"none",color:"#e2e8f0",cursor:"pointer",textAlign:"left",fontFamily:"monospace",fontSize:13,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span>📋 <strong>Azure App Registration Setup Guide</strong> <span style={{fontSize:11,color:"#475569"}}>(one-time IT admin step)</span></span>
                    <span style={{color:"#475569"}}>{showSetup?"▲":"▼"}</span>
                  </button>
                  {showSetup && (
                    <div style={{padding:"0 18px 18px",borderTop:"1px solid #162032",fontSize:12,color:"#64748b",lineHeight:2}}>
                      <div style={{color:"#06b6d4",fontWeight:"bold",marginTop:12,marginBottom:6,fontSize:11,letterSpacing:"0.1em"}}>STEP 1 — CREATE AZURE APP REGISTRATION</div>
                      <div>1. Go to <a href="https://portal.azure.com" target="_blank" style={{color:"#3b82f6"}}>portal.azure.com</a> → <strong style={{color:"#94a3b8"}}>Azure Active Directory → App registrations → New registration</strong></div>
                      <div>2. Name: <code style={{color:"#06b6d4",background:"rgba(6,182,212,0.08)",padding:"1px 5px",borderRadius:3}}>Thai Ledger</code> · Account type: <strong style={{color:"#94a3b8"}}>Single tenant</strong></div>
                      <div>3. Redirect URI: <strong style={{color:"#94a3b8"}}>Single-page application (SPA)</strong> → paste this app's GitHub Pages URL:<br/>
                        <code style={{color:"#f59e0b",background:"rgba(245,158,11,0.08)",padding:"2px 8px",borderRadius:3,fontSize:11}}>{window.location.origin+window.location.pathname}</code>
                      </div>
                      <div>4. Click <strong style={{color:"#94a3b8"}}>Register</strong> → copy <strong style={{color:"#f59e0b"}}>Application (client) ID</strong> and <strong style={{color:"#f59e0b"}}>Directory (tenant) ID</strong></div>
                      <div style={{color:"#06b6d4",fontWeight:"bold",marginTop:14,marginBottom:6,fontSize:11,letterSpacing:"0.1em"}}>STEP 2 — ADD API PERMISSIONS</div>
                      <div>5. <strong style={{color:"#94a3b8"}}>API Permissions → Add a permission → Microsoft Graph → Delegated</strong></div>
                      <div>6. Add: <code style={{color:"#4ade80",background:"rgba(74,222,128,0.08)",padding:"1px 5px",borderRadius:3}}>Files.Read.All</code> and <code style={{color:"#4ade80",background:"rgba(74,222,128,0.08)",padding:"1px 5px",borderRadius:3}}>Sites.Read.All</code></div>
                      <div>7. Click <strong style={{color:"#94a3b8"}}>Grant admin consent</strong></div>
                      <div style={{color:"#06b6d4",fontWeight:"bold",marginTop:14,marginBottom:6,fontSize:11,letterSpacing:"0.1em"}}>STEP 3 — ENTER CREDENTIALS BELOW & SIGN IN</div>
                    </div>
                  )}
                </div>
                <div style={{background:"rgba(13,20,35,0.9)",border:"1px solid #162032",borderRadius:12,padding:20}}>
                  <div style={{fontSize:11,color:"#3b82f6",letterSpacing:"0.14em",marginBottom:16}}>MICROSOFT 365 CONNECTION</div>
                  {[{key:"clientId",label:"Azure App Client ID",ph:"xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",req:true},{key:"tenantId",label:"Azure Tenant ID",ph:"xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",req:true},{key:"folderUrl",label:"Default Folder URL (optional)",ph:"https://yourcompany.sharepoint.com/sites/Finance/Invoices",req:false}].map(f=>(
                    <div key={f.key} style={{marginBottom:14}}>
                      <div style={{fontSize:11,color:"#475569",marginBottom:5}}>{f.label} {f.req&&<span style={{color:"#ef4444"}}>*</span>}</div>
                      <input value={msConfig[f.key]} onChange={e=>setMsConfig(c=>({...c,[f.key]:e.target.value}))} placeholder={f.ph}
                        style={{width:"100%",padding:"9px 12px",background:"rgba(22,32,50,0.6)",border:"1px solid #1e3a5f",borderRadius:7,color:"#e2e8f0",fontSize:12,fontFamily:"monospace"}} />
                    </div>
                  ))}
                  {authError && <div style={{color:"#ef4444",fontSize:12,marginBottom:12,padding:"8px 12px",background:"rgba(239,68,68,0.08)",borderRadius:6,border:"1px solid rgba(239,68,68,0.2)"}}>⚠ {authError}</div>}
                  <button onClick={connectMs} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#0078d4,#106ebe)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:"bold",letterSpacing:"0.06em"}}>🔷 Sign in with Microsoft 365</button>
                  <div style={{fontSize:10,color:"#334155",textAlign:"center",marginTop:10}}>OAuth 2.0 PKCE · Read-only · No passwords stored</div>
                </div>
              </div>
            ) : (
              <div style={{animation:"fadeUp 0.3s ease"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:16,fontSize:12,color:"#475569",flexWrap:"wrap"}}>
                  {folderPath.map((p,i)=>(
                    <span key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                      {i>0&&<span style={{color:"#1e3a5f"}}>›</span>}
                      <button onClick={()=>navBack(i)} style={{background:"transparent",border:"none",color:i===folderPath.length-1?"#94a3b8":"#3b82f6",cursor:"pointer",fontFamily:"monospace",fontSize:12,padding:0}}>{p.name}</button>
                    </span>
                  ))}
                </div>
                <div style={{background:"rgba(13,20,35,0.9)",border:"1px solid #162032",borderRadius:12,overflow:"hidden",marginBottom:16}}>
                  <div style={{padding:"12px 16px",borderBottom:"1px solid #162032",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{fontSize:11,color:"#475569",letterSpacing:"0.1em"}}>{graphFiles.length} ITEMS · {Object.values(selectedFiles).filter(Boolean).length} SELECTED</div>
                    <button onClick={()=>{const pdfs=graphFiles.filter(f=>!f.folder);const all=pdfs.every(f=>selectedFiles[f.id]);const s={};pdfs.forEach(f=>{s[f.id]=!all;});setSelectedFiles(s);}} style={{background:"transparent",border:"1px solid #1e3a5f",borderRadius:5,color:"#64748b",cursor:"pointer",fontSize:10,padding:"4px 10px",fontFamily:"monospace"}}>
                      {graphFiles.filter(f=>!f.folder).every(f=>selectedFiles[f.id])?"DESELECT ALL":"SELECT ALL PDFs"}
                    </button>
                  </div>
                  {graphFiles.length===0&&<div style={{padding:"32px",textAlign:"center",color:"#334155",fontSize:13}}>No PDF files in this folder</div>}
                  {graphFiles.map(item=>(
                    <div key={item.id} className="fh" onClick={()=>item.folder?browseFolder(item):setSelectedFiles(s=>({...s,[item.id]:!s[item.id]}))}
                      style={{padding:"11px 16px",borderBottom:"1px solid rgba(22,32,50,0.6)",display:"flex",alignItems:"center",gap:12,transition:"background 0.1s",background:selectedFiles[item.id]?"rgba(59,130,246,0.05)":"transparent"}}>
                      {!item.folder&&<div style={{width:14,height:14,borderRadius:3,border:`2px solid ${selectedFiles[item.id]?"#3b82f6":"#1e3a5f"}`,background:selectedFiles[item.id]?"#3b82f6":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",flexShrink:0}}>{selectedFiles[item.id]?"✓":""}</div>}
                      <span style={{fontSize:16}}>{item.folder?"📂":"📄"}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:item.folder?"#94a3b8":"#e2e8f0"}}>{item.name}</div>
                        {item.lastModifiedDateTime&&<div style={{fontSize:10,color:"#334155"}}>{new Date(item.lastModifiedDateTime).toLocaleDateString()}{item.size?` · ${Math.round(item.size/1024)}KB`:""}</div>}
                      </div>
                      {item.folder&&<span style={{color:"#334155",fontSize:12}}>›</span>}
                    </div>
                  ))}
                </div>
                <button onClick={downloadAndProcess} disabled={!Object.values(selectedFiles).some(Boolean)}
                  style={{width:"100%",padding:"12px",background:Object.values(selectedFiles).some(Boolean)?"linear-gradient(135deg,#3b82f6,#06b6d4)":"#162032",border:"none",borderRadius:8,color:Object.values(selectedFiles).some(Boolean)?"#fff":"#334155",cursor:Object.values(selectedFiles).some(Boolean)?"pointer":"default",fontSize:13,fontWeight:"bold",letterSpacing:"0.06em"}}>
                  ⚡ Process {Object.values(selectedFiles).filter(Boolean).length} Selected File{Object.values(selectedFiles).filter(Boolean).length!==1?"s":""}
                </button>
              </div>
            )}
          </div>
        )}

        {/* PROCESSING */}
        {isProcessing && (
          <div style={{textAlign:"center",padding:"90px 0"}}>
            <div style={{width:68,height:68,borderRadius:"50%",border:"3px solid #162032",borderTopColor:"#3b82f6",margin:"0 auto 24px",animation:"spin 1s linear infinite"}} />
            <div style={{fontSize:17,color:"#e2e8f0",marginBottom:6,fontWeight:"bold"}}>{stage===STAGES.EXTRACTING?"Extracting Text...":"AI Analyzing..."}</div>
            <div style={{fontSize:12,color:"#475569"}}>{progress.message}</div>
            <div style={{marginTop:18,width:260,height:3,background:"#162032",borderRadius:2,margin:"18px auto 0",overflow:"hidden"}}>
              <div style={{width:`${(progress.current/Math.max(progress.total,1))*100}%`,height:"100%",background:"linear-gradient(90deg,#3b82f6,#06b6d4)",transition:"width 0.3s"}} />
            </div>
            <div style={{fontSize:10,color:"#334155",marginTop:6}}>{progress.current} / {progress.total} files</div>
          </div>
        )}

        {/* RESULTS */}
        {stage===STAGES.DONE && (
          <div style={{animation:"fadeUp 0.4s ease"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:11,color:"#3b82f6",letterSpacing:"0.16em",marginBottom:4}}>STEP 2 — REVIEW & EXPORT</div>
                <div style={{fontSize:19,fontWeight:"bold",color:"#f1f5f9"}}>{results.length} Document{results.length!==1?"s":""} Processed</div>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                <div style={{padding:"7px 13px",background:"rgba(22,32,50,0.6)",borderRadius:7,fontSize:12,color:"#64748b",border:"1px solid #162032"}}>
                  Expense: <span style={{color:"#f87171"}}>{fmt(totalExpense)}</span>
                  {totalWHT>0&&<> · WHT: <span style={{color:"#4ade80"}}>+{fmt(totalWHT)}</span></>}
                </div>
                <button onClick={exportCSV} style={{padding:"9px 20px",background:"linear-gradient(135deg,#3b82f6,#06b6d4)",border:"none",borderRadius:7,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:"bold",letterSpacing:"0.06em"}}>↓ EXPORT QBO CSV</button>
              </div>
            </div>
            {results.map((result,ri)=>{
              const ex=result.extracted;
              return (
                <div key={ri} style={{background:"rgba(13,20,35,0.9)",border:"1px solid #162032",borderRadius:12,marginBottom:20,overflow:"hidden"}}>
                  <div style={{padding:"13px 16px",background:"rgba(22,32,50,0.4)",borderBottom:"1px solid #162032",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <span style={{padding:"2px 8px",background:"rgba(59,130,246,0.1)",borderRadius:4,fontSize:10,color:"#3b82f6",border:"1px solid rgba(59,130,246,0.2)",textTransform:"uppercase"}}>{ex?.documentType||"doc"}</span>
                    <span style={{fontWeight:"bold",color:"#e2e8f0"}}>{ex?.vendor||result.file}</span>
                    {ex?.documentNumber&&<span style={{fontSize:11,color:"#475569"}}>#{ex.documentNumber}</span>}
                    {ex?.documentDate&&<span style={{fontSize:11,color:"#475569"}}>{ex.documentDate}</span>}
                    {result.source==="teams"&&<span style={{fontSize:10,padding:"1px 7px",background:"rgba(0,120,212,0.1)",border:"1px solid rgba(0,120,212,0.2)",borderRadius:3,color:"#0078d4"}}>🔷 Teams</span>}
                    <span style={{marginLeft:"auto",fontSize:10,color:"#334155"}}>{result.file}</span>
                  </div>
                  {ex?.transactions?(
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                      <thead><tr style={{borderBottom:"1px solid #162032"}}>
                        {["✓","DATE","DESCRIPTION","CATEGORY","AMOUNT"].map((h,i)=>(
                          <th key={h} style={{padding:"8px 12px",textAlign:i===4?"right":"left",color:"#334155",fontSize:10,letterSpacing:"0.1em",width:i===0?34:"auto"}}>{h}</th>
                        ))}
                      </tr></thead>
                      <tbody>
                        {ex.transactions.map((t,ti)=>{
                          const key=`${ri}-${ti}`,checked=!!selectedRows[key],amt=parseFloat(t.amount)||0;
                          return (
                            <tr key={ti} className="rh" onClick={()=>toggleRow(key)} style={{borderBottom:"1px solid rgba(22,32,50,0.8)",cursor:"pointer",background:checked?"rgba(59,130,246,0.03)":"transparent"}}>
                              <td style={{padding:"9px 12px"}}><div style={{width:14,height:14,borderRadius:3,border:`2px solid ${checked?"#3b82f6":"#1e3a5f"}`,background:checked?"#3b82f6":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff"}}>{checked?"✓":""}</div></td>
                              <td style={{padding:"9px 12px",color:"#64748b",whiteSpace:"nowrap",fontSize:12}}>{t.date||"—"}</td>
                              <td style={{padding:"9px 12px",color:"#e2e8f0"}}>{t.description}</td>
                              <td style={{padding:"9px 12px"}}>{t.category&&<span style={{padding:"2px 7px",background:"rgba(6,182,212,0.08)",border:"1px solid rgba(6,182,212,0.15)",borderRadius:4,fontSize:10,color:"#06b6d4"}}>{t.category}</span>}</td>
                              <td style={{padding:"9px 12px",textAlign:"right",fontWeight:"bold",color:amt>=0?"#4ade80":"#f87171",fontFamily:"monospace"}}>{amt>=0?"+":""}{fmt(amt)}</td>
                            </tr>
                          );
                        })}
                        {ex.whtAmount>0&&(()=>{
                          const key=`${ri}-wht`,checked=!!selectedRows[key];
                          return (
                            <tr className="rh" onClick={()=>toggleRow(key)} style={{borderBottom:"1px solid rgba(22,32,50,0.8)",cursor:"pointer",background:checked?"rgba(74,222,128,0.03)":"transparent"}}>
                              <td style={{padding:"9px 12px"}}><div style={{width:14,height:14,borderRadius:3,border:`2px solid ${checked?"#4ade80":"#1e3a5f"}`,background:checked?"#4ade80":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#000"}}>{checked?"✓":""}</div></td>
                              <td style={{padding:"9px 12px",color:"#64748b",fontSize:12}}>{ex.documentDate||"—"}</td>
                              <td style={{padding:"9px 12px",color:"#94a3b8",fontStyle:"italic"}}>WHT {ex.whtRate||3}% credit — {ex.documentNumber} <span style={{fontSize:11,color:"#475569"}}>(ภาษีหัก ณ ที่จ่าย)</span></td>
                              <td style={{padding:"9px 12px"}}><span style={{padding:"2px 7px",background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.18)",borderRadius:4,fontSize:10,color:"#4ade80"}}>Withholding Tax Payable</span></td>
                              <td style={{padding:"9px 12px",textAlign:"right",fontWeight:"bold",color:"#4ade80",fontFamily:"monospace"}}>+{fmt(ex.whtAmount)}</td>
                            </tr>
                          );
                        })()}
                      </tbody>
                      {(ex.discount>0||ex.vatAmount>0||ex.whtAmount>0)&&(
                        <tfoot style={{borderTop:"1px solid #162032"}}>
                          {ex.discount>0&&<tr><td colSpan={3}/><td style={{padding:"5px 12px",fontSize:11,color:"#475569"}}>Discount</td><td style={{padding:"5px 12px",textAlign:"right",fontSize:11,color:"#64748b",fontFamily:"monospace"}}>-{fmt(ex.discount)}</td></tr>}
                          {ex.vatAmount>0&&<tr><td colSpan={3}/><td style={{padding:"5px 12px",fontSize:11,color:"#475569"}}>VAT {ex.vatRate||7}%</td><td style={{padding:"5px 12px",textAlign:"right",fontSize:11,color:"#64748b",fontFamily:"monospace"}}>{fmt(ex.vatAmount)}</td></tr>}
                          {ex.whtAmount>0&&<tr><td colSpan={3}/><td style={{padding:"5px 12px",fontSize:11,color:"#475569"}}>WHT {ex.whtRate||3}%</td><td style={{padding:"5px 12px",textAlign:"right",fontSize:11,color:"#4ade80",fontFamily:"monospace"}}>-{fmt(ex.whtAmount)}</td></tr>}
                          <tr style={{background:"rgba(22,32,50,0.3)"}}>
                            <td colSpan={3}/><td style={{padding:"7px 12px",fontSize:12,color:"#94a3b8",fontWeight:"bold"}}>Net Payable</td>
                            <td style={{padding:"7px 12px",textAlign:"right",fontSize:13,color:"#e2e8f0",fontWeight:"bold",fontFamily:"monospace"}}>{fmt(ex.netPayable||ex.totalAmount)}</td>
                          </tr>
                        </tfoot>
                      )}
                    </table>
                  ):(
                    <div style={{padding:20,color:"#ef4444",fontSize:13}}>⚠ {result.error||"Could not extract data"}</div>
                  )}
                </div>
              );
            })}
            <div style={{marginTop:24,padding:16,background:"rgba(6,182,212,0.04)",border:"1px solid rgba(6,182,212,0.15)",borderRadius:10,fontSize:12}}>
              <div style={{fontWeight:"bold",color:"#06b6d4",marginBottom:10,fontSize:10,letterSpacing:"0.12em"}}>📋 HOW TO IMPORT INTO QUICKBOOKS ONLINE</div>
              <ol style={{color:"#64748b",lineHeight:2,paddingLeft:18,margin:0}}>
                <li>In QBO, go to <strong style={{color:"#94a3b8"}}>Transactions → Banking</strong></li>
                <li>Click <strong style={{color:"#94a3b8"}}>Link account → Upload from file</strong></li>
                <li>Select <code style={{color:"#06b6d4"}}>quickbooks_import.csv</code> and choose the target account</li>
                <li>Map columns: <strong style={{color:"#94a3b8"}}>Date, Description, Amount</strong></li>
                <li>The <strong style={{color:"#4ade80"}}>WHT credit row</strong> categorize to <em>Withholding Tax Payable</em> (liability account)</li>
              </ol>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
